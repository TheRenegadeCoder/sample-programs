folder:
  extension: ".fs"
  naming: "pascal"

container:
  image: "mcr.microsoft.com/dotnet/sdk"
  tag: "10.0"
  build: |
    bash -c "dotnet new console --language 'F#' && \
      mv {{ source.name }}{{ source.extension }} Program.fs && \
      dotnet build --sc"
  cmd: "dotnet run --sc --no-restore"