language_display_name: "Commodore BASIC"

folder:
  extension: ".bas"
  naming: "hyphen"

container:
  image: "rzuckerm/commodore-basic"
  tag: "v2-1"
  build: |
    sh -c '(echo "#!/bin/sh"; \
    echo "if [ \"\$#\" = 0 ];"; \
    echo "then"; \
    echo "    cbmbasic {{ source.name }}{{ source.extension }} | sed \"N;0s/^\\r\\n//\";"; \
    echo "else"; \
    echo "    printf \"%s\\n\" \"\$@\" | cbmbasic {{ source.name }}{{ source.extension }}"; \
    echo "fi" \
    ) >{{ source.name }}'
  cmd: "sh ./{{ source.name }}"

notes:
  - "Each command-line argument will end with ASCII 13 when read with GET command"
  - "When there are no more command-line arguments, the GET command returns ASCII 255"
