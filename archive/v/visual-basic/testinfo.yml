folder:
  extension: ".vb"
  naming: "hyphen"

container:
  image: "mcr.microsoft.com/dotnet/sdk"
  tag: "10.0"
  build: |
    bash -c "dotnet new console --language 'VB' && \
      mv {{ source.name }}{{ source.extension }} Program.vb && \
      dotnet build --sc"
  cmd: "dotnet run --sc --no-restore"