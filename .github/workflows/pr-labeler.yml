name: "Pull Request Labeler"

on:
  pull_request_target:
    types:
      - opened
      - synchronize

jobs:
  labeler:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Read repo config
      uses: rzuckerm/action-simple-yaml-reader@main
      id: repo-config
      with:
        config: repo-config.yml

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python_version: "${{ steps.repo-config.outputs.python_version }}"

    - name: Run Poetry Image
      uses: abatilo/actions-poetry@v4
      with:
        poetry_version: "${{ steps.repo-config.outputs.poetry_version }}"

    - name: Install Dependencies
      run: poetry install

    - name: Create labels
      run: poetry run python scripts/set_up_labeler.py

    - name: Show labeler config
      run: cat .github/labeler.yml

    - uses: actions/labeler@v6
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        sync-labels: true
